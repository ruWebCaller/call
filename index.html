<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ruWebCaller Auth</title>
</head>
<body>

    <h2>Авторизация ruWebCaller</h2>
    
    <!-- Самая обычная кнопка, ссылку в ней сформирует JavaScript автоматически -->
    <a id="yandex-login-btn" href="#" 
       style="display:inline-block; background:#ffcc00; color:#000; padding:12px 24px; text-decoration:none; border-radius:8px; font-weight:bold; font-family:sans-serif;">
       Войти с Яндекс ID
    </a>

    <!-- Блок профиля (появится после успешного входа) -->
    <div id="profile" style="display:none; font-family:sans-serif; margin-top:20px;">
        <img id="user-avatar" src="" alt="Аватар" style="width:80px; height:80px; border-radius:50%; display:block; margin-bottom:10px;">
        <h3 id="user-name">Привет!</h3>
        <p>Ваш логин в Яндексе: <span id="user-login" style="font-weight:bold;"></span></p>
    </div>

    <script>
        // === НАСТРОЙКА ===
        // Вставь свой ID из панели Яндекса между кавычками ниже:
        const MY_YANDEX_CLIENT_ID = '221d088d300a4db9b748521d6270f8df'; 
        // =================
        
        // Автоматически генерируем правильную ссылку для кнопки
        document.getElementById('yandex-login-btn').href = `https://yandex.ru{MY_YANDEX_CLIENT_ID}`;

        // Функция проверки авторизации
        function checkYandexAuth() {
            const hash = window.location.hash;
            
            // Если пользователь только что вернулся от Яндекса с токеном
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                
                // Спрашиваем у Яндекса имя и аватарку по этому токену
                fetch('https://yandex.ru', {
                    headers: { 'Authorization': 'OAuth ' + token }
                })
                .then(response => response.json())
                .then(user => {
                    // Прячем кнопку, показываем профиль
                    document.getElementById('yandex-login-btn').style.display = 'none';
                    document.getElementById('profile').style.display = 'block';
                    
                    // Заполняем данные текстом
                    document.getElementById('user-name').innerText = "Привет, " + user.first_name + " " + user.last_name + "!";
                    document.getElementById('user-login').innerText = user.login;
                    
                    // Ставим аватарку
                    if (user.default_avatar_id) {
                        document.getElementById('user-avatar').src = `https://yandex.net{user.default_avatar_id}/islands-200`;
                    } else {
                        document.getElementById('user-avatar').src = 'https://yandex.net';
                    }
                    
                    // Запоминаем логин, чтобы сессия не слетала при обновлении страницы
                    localStorage.setItem('ruwebcaller_user', user.login);
                    window.location.hash = ''; // чистим URL
                })
                .catch(err => console.error("Ошибка API Яндекса:", err));
            } else {
                // Если токена нет, проверяем, входил ли юзер ранее
                const savedUser = localStorage.getItem('ruwebcaller_user');
                if (savedUser) {
                    document.getElementById('yandex-login-btn').style.display = 'none';
                    document.getElementById('profile').style.display = 'block';
                    document.getElementById('user-name').innerText = "С возвращением!";
                    document.getElementById('user-login').innerText = savedUser;
                }
            }
        }

        window.onload = checkYandexAuth;
    </script>

</body>
</html>
